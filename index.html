<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a3a5c" id="mcol">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MeteoNavarra">
<link rel="manifest" href="manifest.json">
<title>MeteoNavarra</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0d1b2a;--sf:#1a2e45;--sf2:#1f3a56;--bd:#2a4a6b;
  --ac:#4fc3f7;--gn:#4caf50;--or:#ff9800;--rd:#f44336;--yw:#ffd600;
  --tx:#e8f4fd;--t2:#c8dff0;--t3:#a8c8e0;
  --sh:0 4px 20px rgba(0,0,0,.5);--rr:14px;--hh:56px;--th:56px;
  --hdr1:#0d2137;--hdr2:#1a3a5c;
}
[data-theme="day"]{
  --bg:#eef3f8;--sf:#fff;--sf2:#e4edf5;--bd:#c0d4e8;
  --ac:#1565c0;--gn:#388e3c;--tx:#1a2e45;--t2:#2a5a8a;--t3:#455a64;
  --sh:0 4px 20px rgba(0,0,0,.1);--hdr1:#1565c0;--hdr2:#1976d2;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;transition:background .25s,color .25s;}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;height:var(--hh);background:linear-gradient(135deg,var(--hdr1),var(--hdr2));display:flex;align-items:center;padding:0 10px;gap:7px;z-index:100;box-shadow:0 2px 14px rgba(0,0,0,.5);}
.logo{font-size:17px;font-weight:800;color:#fff;white-space:nowrap;}
.logo em{color:var(--ac);font-style:normal;}
#sw{flex:1;position:relative;min-width:0;}
#ss{width:100%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:7px 26px 7px 10px;font-size:13px;appearance:none;cursor:pointer;outline:none;}
[data-theme="day"] #ss{background:rgba(255,255,255,.9);color:#1a2e45;}
[data-theme="day"] .logo em{color:#bbdefb;}
#ss option,#ss optgroup{background:#1a2e45;color:#e8f4fd;}
[data-theme="day"] #ss option,[data-theme="day"] #ss optgroup{background:#fff;color:#1a2e45;}
#sw::after{content:'▼';position:absolute;right:8px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.6);font-size:9px;pointer-events:none;}
.hb{background:none;border:none;font-size:20px;cursor:pointer;color:rgba(255,255,255,.8);padding:4px;flex-shrink:0;}
#rbtn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:7px;padding:5px 9px;color:#fff;font-size:16px;cursor:pointer;}
#fbtn.on{color:var(--yw);}

/* TABS */
#tabs{position:fixed;bottom:0;left:0;right:0;height:var(--th);background:var(--sf);border-top:1px solid var(--bd);display:flex;z-index:100;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--t3);font-size:11px;padding:4px 0;transition:color .2s;}
.ti{font-size:19px;}.tb{width:22px;height:2px;border-radius:2px;background:transparent;}
.tab.on{color:var(--ac);}.tab.on .tb{background:var(--ac);}

/* CONTENT */
#cnt{position:fixed;top:var(--hh);bottom:var(--th);left:0;right:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#cnt::-webkit-scrollbar{width:3px;}
#cnt::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px;}
.page{display:none;padding:13px;}.page.on{display:block;}

/* STATUS */
#sb{display:flex;align-items:center;gap:7px;padding:8px 11px;background:var(--sf2);border-radius:8px;margin-bottom:11px;font-size:13px;border:1px solid var(--bd);}
#dot{width:8px;height:8px;border-radius:50%;background:var(--gn);flex-shrink:0;}
#dot.ld{background:var(--or);}
#dot.er{background:var(--rd);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* GRUPOS DE DATOS */
.grp{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rr);padding:14px;margin-bottom:11px;box-shadow:var(--sh);}
.grp-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:12px;}
.grp-2col{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;}
.grp-2col .grp{margin-bottom:0;}
.row2{display:flex;gap:0;align-items:stretch;}
.cell{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:8px 4px;}
.cell+.cell{border-left:1px solid var(--bd);}
.cell-icon{font-size:28px;margin-bottom:6px;}
.cell-val{font-size:28px;font-weight:800;line-height:1;color:var(--tx);}
.cell-lbl{font-size:11px;color:var(--t3);margin-top:4px;font-weight:600;}
.cell-unit{font-size:12px;color:var(--t2);margin-top:2px;}

/* VIENTO */
.wind-wrap{display:flex;align-items:center;gap:14px;}
.cmp{width:70px;height:70px;flex-shrink:0;}
.wind-data{flex:1;display:flex;flex-direction:column;gap:8px;}
.wind-dir-big{font-size:26px;font-weight:800;color:var(--ac);}
.wind-row{display:flex;gap:16px;}
.wind-item{flex:1;}
.wind-item .cell-lbl{text-align:left;}
.wind-item .cell-val{font-size:22px;text-align:left;}

/* GRÁFICAS */
.leg{display:flex;gap:14px;justify-content:center;margin-bottom:8px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2);}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.chart-wrap{display:flex;height:220px;}
.chart-yL{width:44px;flex-shrink:0;height:220px;}
.chart-yR{width:44px;flex-shrink:0;height:220px;}
.chart-scroll{flex:1;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;padding-bottom:14px;}
.chart-scroll::-webkit-scrollbar{height:4px;}
.chart-scroll::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px;}
.chart-inner{height:206px;}

/* ERROR */
#eb{display:none;background:rgba(244,67,54,.1);border:1px solid var(--rd);border-radius:10px;padding:13px;margin-bottom:11px;font-size:13px;color:#ef9a9a;line-height:1.6;}
#eb.on{display:block;}

/* FAV */
.fi{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;display:flex;align-items:center;padding:11px 13px;gap:10px;cursor:pointer;margin-bottom:8px;}
.fn{flex:1;font-size:15px;}.fz{font-size:11px;color:var(--t3);}
.frm{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer;padding:4px;}

/* TOAST */

.empty{text-align:center;color:var(--t3);padding:44px 20px;font-size:14px;line-height:1.7;}
#upd{font-size:12px;color:var(--t3);text-align:center;margin-bottom:11px;}


</style>
</head>
<body>

<div id="hdr">
  <div class="logo"><em>Meteo</em>Nav</div>
  <div id="sw"><select id="ss"></select></div>
  <button class="hb" id="fbtn">☆</button>
  <button class="hb" id="tbtn">🌙</button>
  <button id="rbtn">↻</button>
</div>

<div id="cnt">
  <div id="page-datos" class="page on">
    <div id="sb"><div id="dot"></div><span id="stx">Listo</span></div>
    <div id="eb"></div>
    <div id="upd"></div>
    <div id="dc"></div>
  </div>
  <div id="page-graficas" class="page">
    <div class="grp">
      <div class="leg" id="leg1"></div>
      <div class="chart-wrap"><canvas id="ch1yL" class="chart-yL"></canvas><div class="chart-scroll"><div class="chart-inner"><canvas id="ch1"></canvas></div></div><canvas id="ch1yR" class="chart-yR"></canvas></div>
    </div>
    <div class="grp">
      <div class="leg" id="leg2"></div>
      <div class="chart-wrap"><canvas id="ch2yL" class="chart-yL"></canvas><div class="chart-scroll"><div class="chart-inner"><canvas id="ch2"></canvas></div></div><canvas id="ch2yR" class="chart-yR"></canvas></div>
    </div>
  </div>
  <div id="page-favs" class="page">
    <div style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;">⭐ Mis favoritas</div>
    <div id="fl"></div>
  </div>
</div>

<div id="tabs">
  <div class="tab on" data-p="datos"><div class="ti">🌡️</div><div class="tb"></div><span>Datos</span></div>
  <div class="tab" data-p="graficas"><div class="ti">📈</div><div class="tb"></div><span>Gráficas</span></div>
  <div class="tab" data-p="favs"><div class="ti">⭐</div><div class="tb"></div><span>Favoritos</span></div>
</div>

<script>
// ── ESTACIONES ──
const EST = [
  {id:274,n:"Ablitas"},{id:519,n:"Abodi (Pikatua)"},
  {id:263,n:"Adiós"},{id:33,n:"Aguilar de Codés"},
  {id:262,n:"Aibar"},{id:34,n:"Aoiz"},
  {id:22,n:"Aralar"},{id:23,n:"Arangoiti"},
  {id:264,n:"Artajona"},
  {id:275,n:"Bardenas (El Plano)"},
  {id:31,n:"Bardenas (El Yugo)"},{id:26,n:"Bardenas (Loma Negra)"},
  {id:268,n:"Bargota"},{id:12,n:"Beortegi"},
  {id:460,n:"Bera (Larrategaña)"},
  {id:35,n:"Carcastillo (La Oliva)"},{id:24,n:"Carrascal"},
  {id:276,n:"Cascante"},
  {id:42,n:"Doneztebe-Santesteban"},{id:28,n:"El Perdón"},
  {id:461,n:"Eltzaburu"},{id:249,n:"Erremendia (Salazar)"},
  {id:7,n:"Estella"},{id:517,n:"Etxalar (Orizkiko Lepoa)"},
  {id:8,n:"Etxarri-Aranatz"},{id:269,n:"Falces"},
  {id:273,n:"Fitero"},
  {id:246,n:"Getadar"},{id:499,n:"Goizueta"},
  {id:25,n:"Gorramendi"},{id:497,n:"Iñarbegi"},
  {id:32,n:"Irabia"},{id:502,n:"Isaba-Refugio Belagua"},
  {id:518,n:"Lesaka (Astazelaieta)"},
  {id:424,n:"Los Arcos"},
  {id:266,n:"Miranda de Arga"},{id:270,n:"Murillo el Fruto"},
  
  {id:37,n:"Oskotz"},{id:455,n:"Pamplona"},
  {id:271,n:"San Adrián"},{id:265,n:"San Martín de Unx"},
  {id:21,n:"Sartaguda"},
  {id:423,n:"Sesma"},{id:9,n:"Tafalla"},
  {id:29,n:"Trinidad de Iturgoien"},
  {id:36,n:"Tudela (Montes de Cierzo)"},{id:272,n:"Tudela (Valdetellas)"},
  {id:30,n:"Ujué"},{id:250,n:"Urbasa"},
  {id:11,n:"Villanueva de Yerri"},{id:10,n:"Yesa"},
].sort((a,b)=>a.n.localeCompare(b.n,'es'));

// ── PARÁMETROS VERIFICADOS ──
// p_10=1 temperatura | p_10=2 humedad | p_10=3 radiación W/m²
// p_10=4 insolación s | p_10=6 vel.media km/h | p_10=7 dir.viento °
// p_10=9 racha máx km/h | p_10=12 precipitación L/m²
const PARAMS = { temp:1, hum:2, rad:3, ins:4, vel:6, dir:7, raf:9, prec:12 };
// Parámetros que tienen la columna útil en cells[2] en vez de cells[1]
const PARAMS_COL2 = new Set([6,9]);

const PROXY  = u => `https://meteonavarra.mcalvo81.workers.dev/?url=${encodeURIComponent(u)}`;
const PROXY2 = u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`;
const PROXY3 = u => `https://corsproxy.io/?${encodeURIComponent(u)}`;

const S = {
  est: EST.find(e=>e.id===455),
  favs: JSON.parse(localStorage.getItem('mnf4')||'[]'),
  theme: localStorage.getItem('mnt4')||'dark',
  charts:{}, hist:[],
};

function gid(s){ return document.getElementById(s); }

// ── FECHA ──
function fechaStr(d){
  return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
}
function fechaHoy(){
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  return `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()}`;
}

// ── URL ──
function makeURL(estId, param, desde, hasta){
  return `https://meteo.navarra.es/estaciones/estacion_datos_m.cfm?IDEstacion=${estId}&fecha_desde=${fechaStr(desde)}&fecha_hasta=${fechaStr(hasta)}&p_10=${param}`;
}

// ── FETCH ──
async function fetchOne(url){
  for(const px of [PROXY,PROXY2,PROXY3]){
    try{
      const r=await fetch(px(url),{signal:AbortSignal.timeout(15000)});
      if(!r.ok) continue;
      // MeteoNavarra usa iso-8859-1 — leer como ArrayBuffer y decodificar
      const buf=await r.arrayBuffer();
      const t=new TextDecoder('iso-8859-1').decode(buf);
      if(t.length>200) return t;
    }catch(e){}
  }
  return null;
}

// ── PARSEO ──
// Devuelve array de {fecha, hora, v} — una entrada por fila válida
function parseParam(html, col=1){
  const doc=new DOMParser().parseFromString(html,'text/html');
  const tbl=doc.querySelectorAll('table')[2];
  if(!tbl) return [];
  const out=[];
  const rows=tbl.querySelectorAll('tr');
  for(let i=2;i<rows.length;i++){
    const cells=rows[i].querySelectorAll('td');
    if(cells.length<col+1) continue;
    const ds=cells[0].textContent.replace(/\s+/g,' ').trim();
    if(!/^\d{2}\/\d{2}\/\d{4}/.test(ds)) continue;
    const parts=ds.split(' ');
    const fecha=parts[0];
    const hora=parts[1]||'';
    if(!hora) continue;
    const raw=cells[col].textContent.replace(/\s+/g,' ').trim().replace(',','.');
    if(!raw||raw==='- -'||raw==='--'||raw==='-'||raw==='') continue;
    const v=parseFloat(raw);
    if(!isNaN(v)) out.push({fecha,hora,v});
  }
  return out;
}

// Combina varios arrays por fecha+hora
function combine(paramResults){
  const map={};
  for(const {key,rows} of paramResults){
    for(const {fecha,hora,v} of rows){
      const k=fecha+'|'+hora;
      if(!map[k]) map[k]={fecha,hora};
      map[k][key]=v;
    }
  }
  return Object.values(map).sort((a,b)=>{
    const padH=h=>{const[hh,mm]=h.split(':');return hh.padStart(2,'0')+mm.padStart(2,'0');};
    const fa=a.fecha.split('/').reverse().join('')+padH(a.hora);
    const fb=b.fecha.split('/').reverse().join('')+padH(b.hora);
    return fa.localeCompare(fb);
  });
}

// ── CARGA ──
async function load(){
  setStatus('ld','Cargando...');
  gid('eb').classList.remove('on');
  gid('dc').innerHTML='';
  gid('upd').textContent='';

  try{
    const now=new Date();
    const ayer=new Date(now.getTime()-86400000);
    const manana=new Date(now.getTime()+86400000);
    const hoy=fechaHoy();

    // Petición de HOY para dato actual (desde hoy hasta mañana)
    const resCur=await Promise.all(
      Object.entries(PARAMS).map(([key,pnum])=>
        fetchOne(makeURL(S.est.id,pnum,now,manana))
          .then(html=>({key,rows:html?parseParam(html,PARAMS_COL2.has(pnum)?2:1):[]}))
          .catch(()=>({key,rows:[]}))
      )
    );
    const rowsHoy=combine(resCur).filter(r=>r.fecha===hoy);

    // Petición AYER+HOY para historial gráficas (desde ayer hasta mañana)
    const resHist=await Promise.all(
      Object.entries(PARAMS).map(([key,pnum])=>
        fetchOne(makeURL(S.est.id,pnum,ayer,manana))
          .then(html=>({key,rows:html?parseParam(html,PARAMS_COL2.has(pnum)?2:1):[]}))
          .catch(()=>({key,rows:[]}))
      )
    );
    const rowsAll=combine(resHist);

    if(!rowsHoy.length && !rowsAll.length){
      throw new Error('No hay datos disponibles para esta estación hoy.\nPrueba con otra estación automática.');
    }

    // Dato actual = última lectura de hoy con temperatura o velocidad
    const base=rowsHoy.length?rowsHoy:rowsAll;
    const cur=[...base].reverse().find(r=>r.temp!=null||r.vel!=null)||base[base.length-1];

    S.hist=rowsAll;
    renderDatos(cur||rowsAll[rowsAll.length-1]);
    renderCharts(rowsAll);

    const c=cur||rowsAll[rowsAll.length-1];
    const [hh,mm]=(c.hora||'0:00').split(':');
    const hora24=String(parseInt(hh)).padStart(2,'0')+':'+String(mm||'00').padStart(2,'0');
    gid('upd').textContent=`Última lectura: ${c.fecha} ${hora24} (UTC)`;
    setStatus('ok',S.est.n);

  }catch(err){
    gid('dc').innerHTML='';
    gid('eb').innerHTML=`<strong>⚠️ Error</strong><br>${err.message.replace(/\n/g,'<br>')}`;
    gid('eb').classList.add('on');
    setStatus('er','Error');
  }
}

// ── RENDER DATOS ──
function d2dir(d){
  if(d==null) return '--';
  return ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'][Math.round(((d%360)+360)/22.5)%16];
}
function tcol(t){
  if(t==null) return 'var(--tx)';
  if(t<=0) return '#81d4fa'; if(t<=10) return '#4fc3f7';
  if(t<=20) return '#81c784'; if(t<=28) return '#ffb74d'; return '#ef5350';
}
function wxic(t,r,rd){
  if(r>2) return '🌧️'; if(r>.2) return '🌦️';
  if(rd>600) return '☀️'; if(rd>200) return '⛅';
  if(t!=null&&t<0) return '❄️'; return '🌥️';
}
const fm=(v,d=1)=>v!=null?parseFloat(v).toFixed(d):'--';

function renderDatos(d){
  if(!d){gid('dc').innerHTML='';return;}
  const dir=d2dir(d.dir), deg=d.dir||0;
  gid('dc').innerHTML=`
    <div class="grp">
      <div class="grp-title">🌡️ Temperatura &amp; Humedad</div>
      <div class="row2">
        <div class="cell">
          <div class="cell-icon">${wxic(d.temp,d.prec||0,d.rad||0)}</div>
          <div class="cell-val" style="color:${tcol(d.temp)}">${fm(d.temp,1)}°C</div>
          <div class="cell-lbl">Temperatura</div>
        </div>
        <div class="cell">
          <div class="cell-icon">💧</div>
          <div class="cell-val">${fm(d.hum,0)}%</div>
          <div class="cell-lbl">Humedad rel.</div>
        </div>
      </div>
    </div>
    <div class="grp">
      <div class="grp-title">💨 Viento</div>
      <div class="wind-wrap">
        <svg class="cmp" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
          <circle cx="30" cy="30" r="28" fill="none" stroke="var(--bd)" stroke-width="1.5"/>
          <text x="30" y="9"  text-anchor="middle" fill="var(--t3)" font-size="7.5" font-family="system-ui">N</text>
          <text x="30" y="55" text-anchor="middle" fill="var(--t3)" font-size="7.5" font-family="system-ui">S</text>
          <text x="7"  y="33" text-anchor="middle" fill="var(--t3)" font-size="7.5" font-family="system-ui">O</text>
          <text x="53" y="33" text-anchor="middle" fill="var(--t3)" font-size="7.5" font-family="system-ui">E</text>
          <g transform="rotate(${deg},30,30)">
            <polygon points="30,8 26,30 30,25 34,30" fill="var(--ac)"/>
            <polygon points="30,52 26,30 30,35 34,30" fill="var(--bd)"/>
          </g>
          <circle cx="30" cy="30" r="3" fill="var(--ac)"/>
        </svg>
        <div class="wind-data">
          <div class="wind-dir-big">${dir} <span style="font-size:16px;color:var(--t2)">${d.dir!=null?Math.round(d.dir)+'°':''}</span></div>
          <div class="wind-row">
            <div class="wind-item">
              <div class="cell-lbl">Vel. media</div>
              <div class="cell-val" style="font-size:22px">${fm(d.vel,1)} <span style="font-size:13px;color:var(--t2)">km/h</span></div>
            </div>
            <div class="wind-item">
              <div class="cell-lbl">Ráfaga máx.</div>
              <div class="cell-val" style="font-size:22px">${fm(d.raf,1)} <span style="font-size:13px;color:var(--t2)">km/h</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="grp-2col">
      <div class="grp">
        <div class="grp-title">🌧️ Precipitación</div>
        <div class="cell-val">${fm(d.prec,1)}</div>
        <div class="cell-unit">L/m²</div>
      </div>
      <div class="grp">
        <div class="grp-title">☀️ Radiación</div>
        <div class="cell-val">${fm(d.rad,0)}</div>
        <div class="cell-unit">W/m² · ins: ${fm(d.ins,0)}s</div>
      </div>
    </div>`;
}

// ── GRÁFICAS ──
function renderCharts(rows){
  const day=S.theme==='day';
  const gc=day?'rgba(192,212,232,.7)':'rgba(42,74,107,.6)';
  const tc=day?'#2a5a8a':'#90b4ce';

  // Solo filas con al menos un dato real — elimina horas sin medición
  const valid=rows.filter(r=>r.hum!=null||r.vel!=null||r.dir!=null);
  const data=valid.slice(-144);
  const labels=data.map(r=>r.hora);
  const W=Math.max(data.length*14,300);

  // Leyendas
  gid('leg1').innerHTML=`
    <div class="leg-item"><div class="leg-dot" style="background:#29b6f6"></div>Humedad (%)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#ce93d8"></div>Dir. Viento (°)</div>`;
  gid('leg2').innerHTML=`
    <div class="leg-item"><div class="leg-dot" style="background:#66bb6a"></div>Vel. media (km/h)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#ef5350"></div>Ráfaga (km/h)</div>`;

  // Tamaño canvas de datos (scrollable)
  ['ch1','ch2'].forEach(id=>{
    const cv=gid(id);
    cv.style.width=W+'px'; cv.style.height='206px';
    cv.width=W; cv.height=206;
    cv.parentElement.style.width=W+'px';
  });

  // Tamaño canvas de ejes fijos
  ['ch1yL','ch1yR','ch2yL','ch2yR'].forEach(id=>{
    const cv=gid(id); if(!cv) return;
    cv.style.width='44px'; cv.style.height='220px';
    cv.width=44; cv.height=220;
  });

  // Máximo viento para escala
  const maxViento=Math.ceil(Math.max(10,...data.map(r=>r.raf??0).filter(v=>v>0))/10)*10+10;

  // Opciones canvas datos (sin ejes Y visibles)
  const dataOpts=(yScales)=>({
    responsive:false, maintainAspectRatio:false, animation:false,
    plugins:{legend:{display:false}},
    scales:{
      x:{ticks:{color:tc,font:{size:9},maxRotation:90,minRotation:90,autoSkip:false},grid:{color:gc}},
      ...yScales
    }
  });

  // Opciones canvas eje Y (sin eje X, sin datos visibles)
  const axisOpts=(yScales)=>({
    responsive:false, maintainAspectRatio:false, animation:false,
    plugins:{legend:{display:false}},
    scales:{x:{display:false}, ...yScales}
  });

  // ── GRÁFICA 1: datos ──
  if(S.charts.c1) S.charts.c1.destroy();
  S.charts.c1=new Chart(gid('ch1'),{type:'line',
    data:{labels,datasets:[
      {data:data.map(r=>r.hum??null),borderColor:'#29b6f6',backgroundColor:'rgba(41,182,246,.08)',fill:true,tension:.3,pointRadius:1.5,spanGaps:false,yAxisID:'y'},
      {data:data.map(r=>r.dir??null),borderColor:'#ce93d8',fill:false,tension:0,pointRadius:1.5,spanGaps:false,yAxisID:'y1'}
    ]},
    options:dataOpts({
      y:{position:'left',display:false,min:0,max:100},
      y1:{position:'right',display:false,min:0,max:360}
    })
  });

  // Eje izquierdo gráfica 1
  if(S.charts.c1yL) S.charts.c1yL.destroy();
  S.charts.c1yL=new Chart(gid('ch1yL'),{type:'line',
    data:{labels:[''],datasets:[{data:[null],yAxisID:'y',borderColor:'transparent'},{data:[null],yAxisID:'y1',borderColor:'transparent'}]},
    options:axisOpts({
      y:{position:'left',ticks:{color:'#29b6f6',font:{size:8},maxTicksLimit:6},grid:{color:gc},min:0,max:100},
      y1:{position:'right',display:false,min:0,max:360}
    })
  });

  // Eje derecho gráfica 1
  if(S.charts.c1yR) S.charts.c1yR.destroy();
  S.charts.c1yR=new Chart(gid('ch1yR'),{type:'line',
    data:{labels:[''],datasets:[{data:[null],yAxisID:'y',borderColor:'transparent'},{data:[null],yAxisID:'y1',borderColor:'transparent'}]},
    options:axisOpts({
      y:{position:'left',display:false,min:0,max:100},
      y1:{position:'right',ticks:{color:'#ce93d8',font:{size:8},maxTicksLimit:5},grid:{drawOnChartArea:false},min:0,max:360}
    })
  });

  // ── GRÁFICA 2: datos ──
  if(S.charts.c2) S.charts.c2.destroy();
  S.charts.c2=new Chart(gid('ch2'),{type:'line',
    data:{labels,datasets:[
      {data:data.map(r=>r.vel??null),borderColor:'#66bb6a',backgroundColor:'rgba(102,187,106,.08)',fill:true,tension:.3,pointRadius:1.5,spanGaps:false},
      {data:data.map(r=>r.raf??null),borderColor:'#ef5350',fill:false,tension:.3,pointRadius:1.5,borderDash:[4,3],spanGaps:false,yAxisID:'y1'}
    ]},
    options:dataOpts({
      y:{position:'left',display:false,min:0,max:maxViento},
      y1:{position:'right',display:false,min:0,max:maxViento}
    })
  });

  // Eje izquierdo gráfica 2
  if(S.charts.c2yL) S.charts.c2yL.destroy();
  S.charts.c2yL=new Chart(gid('ch2yL'),{type:'line',
    data:{labels:[''],datasets:[{data:[null],borderColor:'transparent'}]},
    options:axisOpts({
      y:{position:'left',ticks:{color:'#66bb6a',font:{size:8},maxTicksLimit:6},grid:{color:gc},min:0,max:maxViento}
    })
  });

  if(S.charts.c2yR) S.charts.c2yR.destroy();
  S.charts.c2yR=new Chart(gid('ch2yR'),{type:'line',
    data:{labels:[''],datasets:[{data:[null],yAxisID:'y1',borderColor:'transparent'}]},
    options:axisOpts({
      y1:{position:'right',ticks:{color:'#ef5350',font:{size:8},maxTicksLimit:6},grid:{drawOnChartArea:false},min:0,max:maxViento}
    })
  });
}

// ── UI ──
function setStatus(t,msg){
  gid('dot').className=t==='ld'?'ld':t==='er'?'er':'';
  gid('stx').textContent=msg;
}
function switchTab(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  gid(`page-${name}`).classList.add('on');
  document.querySelector(`.tab[data-p="${name}"]`).classList.add('on');
}
function selSt(eid){
  S.est=EST.find(e=>e.id===eid)||EST[0];
  for(const op of gid('ss').options) if(parseInt(op.value)===S.est.id){op.selected=true;break;}
  updFavBtn(); load();
}
function applyTheme(t){
  S.theme=t; document.body.dataset.theme=t==='day'?'day':'';
  gid('tbtn').textContent=t==='day'?'☀️':'🌙';
  gid('mcol').content=t==='day'?'#1565c0':'#1a3a5c';
  localStorage.setItem('mnt4',t);
  if(S.hist.length) renderCharts(S.hist);
}
function buildSel(){
  const sel=gid('ss'); sel.innerHTML='';
  EST.forEach(e=>{
    const op=document.createElement('option');
    op.value=e.id; op.textContent=e.n;
    if(e.id===S.est.id) op.selected=true;
    sel.appendChild(op);
  });
}
const saveFavs=()=>localStorage.setItem('mnf4',JSON.stringify(S.favs));
const isFav=id=>S.favs.includes(id);
function updFavBtn(){
  gid('fbtn').textContent=isFav(S.est.id)?'★':'☆';
  gid('fbtn').classList.toggle('on',isFav(S.est.id));
}
function renderFavs(){
  const fl=gid('fl');
  if(!S.favs.length){fl.innerHTML='<div class="empty">Sin favoritos.<br>Pulsa ☆ para añadir.</div>';return;}
  fl.innerHTML='';
  S.favs.forEach(fid=>{
    const e=EST.find(x=>x.id===fid);if(!e)return;
    const d=document.createElement('div');d.className='fi';
    d.innerHTML=`<div><div class="fn">${e.n}</div><div class="fz">🟢 Automática</div></div><button class="frm">✕</button>`;
    d.addEventListener('click',ev=>{if(ev.target.classList.contains('frm'))return;selSt(fid);switchTab('datos');});
    d.querySelector('.frm').addEventListener('click',()=>{S.favs=S.favs.filter(f=>f!==fid);saveFavs();updFavBtn();renderFavs();toast('Eliminado');});
    fl.appendChild(d);
  });
}
function toast(m){}

// ── INIT ──
document.addEventListener('DOMContentLoaded',()=>{
  // Routing por URL o sessionStorage (desde 404.html)
  const rawSlug = sessionStorage.getItem('mn_slug') || location.pathname.split('/').filter(Boolean).pop() || '';
  sessionStorage.removeItem('mn_slug');
  if(rawSlug && rawSlug !== 'meteonavarra' && rawSlug !== 'index.html'){
    const norm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'-');
    const match = EST.find(e => norm(e.n) === rawSlug || norm(e.n).startsWith(rawSlug));
    if(match) S.est = match;
  }

  applyTheme(S.theme);
  buildSel();
  updFavBtn();
  renderFavs();

  gid('ss').addEventListener('change',function(){
    if(!this.value)return;
    S.est=EST.find(e=>e.id===parseInt(this.value));
    // Actualizar URL sin recargar
    const slug=S.est.n.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'-');
    history.pushState({},'','/meteonavarra/'+slug);
    updFavBtn();load();
  });
  gid('rbtn').addEventListener('click',load);
  gid('tbtn').addEventListener('click',()=>applyTheme(S.theme==='day'?'dark':'day'));
  gid('fbtn').addEventListener('click',()=>{
    const i=S.est.id;
    if(isFav(i)){S.favs=S.favs.filter(f=>f!==i);toast('Eliminada de favoritos');}
    else{S.favs.push(i);toast('⭐ Añadida a favoritos');}
    saveFavs();updFavBtn();renderFavs();
  });
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.p)));
  load();
  setInterval(load,10*60*1000);
  if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
});
</script>
</body>
