<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a3a5c" id="mcol">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MeteoNavarra">
<link rel="manifest" href="manifest.json">
<title>MeteoNavarra</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0d1b2a;--sf:#1a2e45;--sf2:#1f3a56;--bd:#2a4a6b;
  --ac:#4fc3f7;--gn:#4caf50;--or:#ff9800;--rd:#f44336;--yw:#ffd600;
  --tx:#e8f4fd;--t2:#c8dff0;--t3:#a8c8e0;
  --sh:0 4px 20px rgba(0,0,0,.5);--rr:14px;--hh:56px;--th:56px;
  --hdr1:#0d2137;--hdr2:#1a3a5c;
}
[data-theme="day"]{
  --bg:#eef3f8;--sf:#fff;--sf2:#e4edf5;--bd:#c0d4e8;
  --ac:#1565c0;--gn:#388e3c;--tx:#1a2e45;--t2:#2a5a8a;--t3:#607d8b;
  --sh:0 4px 20px rgba(0,0,0,.1);--hdr1:#1565c0;--hdr2:#1976d2;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;transition:background .25s,color .25s;}

#hdr{position:fixed;top:0;left:0;right:0;height:var(--hh);background:linear-gradient(135deg,var(--hdr1),var(--hdr2));display:flex;align-items:center;padding:0 10px;gap:7px;z-index:100;box-shadow:0 2px 14px rgba(0,0,0,.5);border-bottom:1px solid var(--bd);}
.logo{font-size:17px;font-weight:800;color:#fff;white-space:nowrap;}
.logo em{color:var(--ac);font-style:normal;}
#sw{flex:1;position:relative;min-width:0;}
#ss{width:100%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:7px 26px 7px 10px;font-size:13px;appearance:none;cursor:pointer;outline:none;}
[data-theme="day"] #ss{background:rgba(255,255,255,.9);color:#1a2e45;}
#ss option,#ss optgroup{background:#1a2e45;color:#e8f4fd;}
[data-theme="day"] #ss option,[data-theme="day"] #ss optgroup{background:#fff;color:#1a2e45;}
#sw::after{content:'▼';position:absolute;right:8px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.6);font-size:9px;pointer-events:none;}
.hb{background:none;border:none;font-size:20px;cursor:pointer;color:rgba(255,255,255,.8);padding:4px;flex-shrink:0;}
#rbtn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:7px;padding:5px 9px;color:#fff;font-size:16px;cursor:pointer;}
#fbtn.on{color:var(--yw);}

#tabs{position:fixed;bottom:0;left:0;right:0;height:var(--th);background:var(--sf);border-top:1px solid var(--bd);display:flex;z-index:100;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--t3);font-size:11px;padding:4px 0;transition:color .2s;}
.ti{font-size:19px;}.tb{width:22px;height:2px;border-radius:2px;background:transparent;}
.tab.on{color:var(--ac);}.tab.on .tb{background:var(--ac);}

#cnt{position:fixed;top:var(--hh);bottom:var(--th);left:0;right:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#cnt::-webkit-scrollbar{width:3px;}
#cnt::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px;}
.page{display:none;padding:13px;}.page.on{display:block;}

.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rr);padding:13px;margin-bottom:11px;box-shadow:var(--sh);}
.ct{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:11px;}

#sb{display:flex;align-items:center;gap:7px;padding:8px 11px;background:var(--sf2);border-radius:8px;margin-bottom:11px;font-size:13px;border:1px solid var(--bd);}
#dot{width:8px;height:8px;border-radius:50%;background:var(--gn);flex-shrink:0;}
#dot.ld{background:var(--or);animation:pulse 1s infinite;}
#dot.er{background:var(--rd);}
#stx{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.dg{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.di{background:var(--sf2);border-radius:10px;padding:11px;display:flex;flex-direction:column;border:1px solid var(--bd);}
.di.full{grid-column:1/-1;}
.lb{font-size:11px;color:var(--t3);margin-bottom:3px;font-weight:600;}
.vl{font-size:22px;font-weight:700;line-height:1.1;}
.un{font-size:12px;color:var(--t2);margin-top:2px;}
.ic{font-size:18px;margin-bottom:3px;}
.tc{grid-column:1/-1;background:linear-gradient(135deg,#112740,#183554)!important;flex-direction:row!important;align-items:center!important;gap:14px!important;}
[data-theme="day"] .tc{background:linear-gradient(135deg,#bbdefb,#90caf9)!important;border-color:#90caf9!important;}
.tv{font-size:40px!important;font-weight:800!important;}
.wr{display:flex;align-items:center;gap:11px;}
.cmp{width:50px;height:50px;flex-shrink:0;}
.cw{position:relative;height:195px;}

.fi{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;display:flex;align-items:center;padding:11px 13px;gap:10px;cursor:pointer;margin-bottom:8px;}
.fn{flex:1;font-size:15px;}.fz{font-size:11px;color:var(--t3);}
.frm{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer;padding:4px;}

#eb{display:none;background:rgba(244,67,54,.1);border:1px solid var(--rd);border-radius:10px;padding:13px;margin-bottom:11px;font-size:13px;color:#ef9a9a;line-height:1.6;}
#eb.on{display:block;}

#ldr{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);flex-direction:column;align-items:center;justify-content:center;padding:20px 28px;gap:10px;color:var(--t2);background:var(--sf);border:1px solid var(--bd);border-radius:12px;z-index:150;box-shadow:var(--sh);}
.sp{width:34px;height:34px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

#toast{position:fixed;bottom:calc(var(--th)+10px);left:50%;transform:translateX(-50%) translateY(80px);background:var(--sf2);border:1px solid var(--bd);border-radius:24px;padding:8px 16px;font-size:13px;color:var(--tx);z-index:200;transition:transform .3s;white-space:nowrap;box-shadow:var(--sh);}
#toast.on{transform:translateX(-50%) translateY(0);}
.empty{text-align:center;color:var(--t3);padding:44px 20px;font-size:14px;line-height:1.7;}
.grp{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rr);padding:14px;margin-bottom:11px;box-shadow:var(--sh);}
.grp-2col{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;}
.grp-2col .grp{margin-bottom:0;}
.grp-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:12px;}
.grp-row{display:flex;gap:16px;align-items:flex-start;}
.grp-main{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;}
.big-val{font-size:32px;font-weight:800;line-height:1;color:var(--tx);}
.big-lbl{font-size:12px;color:var(--t3);margin-top:4px;font-weight:600;}
.wind-dir{font-size:28px;font-weight:800;color:var(--ac);margin-bottom:8px;}
.wind-row2{display:flex;gap:16px;}
.cmp{width:64px;height:64px;flex-shrink:0;}
#upd{font-size:12px;color:var(--t3);text-align:center;margin-bottom:11px;}
</style>
</head>
<body>

<div id="hdr">
  <div class="logo"><em>Meteo</em>Nav</div>
  <div id="sw"><select id="ss"></select></div>
  <button class="hb" id="fbtn">☆</button>
  <button class="hb" id="tbtn">🌙</button>
  <button id="rbtn">↻</button>
</div>

<div id="cnt">
  <div id="page-datos" class="page on">
    <div id="sb"><div id="dot"></div><span id="stx">Listo</span></div>
    <div id="eb"></div>
    <div id="upd"></div>
    <div id="dc"></div>
  </div>
  <div id="page-graficas" class="page">
    <div class="card">
      <div class="ct">💧 Humedad relativa &amp; Dirección del viento</div>
      <div class="cw"><canvas id="ch1"></canvas></div>
    </div>
    <div class="card">
      <div class="ct">💨 Velocidad media &amp; Ráfaga máxima (km/h)</div>
      <div class="cw"><canvas id="ch2"></canvas></div>
    </div>
    <p style="text-align:center;color:var(--t3);font-size:11px;padding-bottom:4px;">Datos reales · lecturas cada 10 min</p>
  </div>
  <div id="page-favs" class="page">
    <div style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;">⭐ Mis favoritas</div>
    <div id="fl"></div>
  </div>
</div>

<div id="tabs">
  <div class="tab on" data-p="datos"><div class="ti">🌡️</div><div class="tb"></div><span>Datos</span></div>
  <div class="tab" data-p="graficas"><div class="ti">📈</div><div class="tb"></div><span>Gráficas</span></div>
  <div class="tab" data-p="favs"><div class="ti">⭐</div><div class="tb"></div><span>Favoritos</span></div>
</div>

<div id="toast"></div>

<script>
const EST = [
  {id:274,n:"Ablitas"},{id:519,n:"Abodi (Pikatua)"},
  {id:263,n:"Adiós"},{id:33,n:"Aguilar de Codés"},
  {id:262,n:"Aibar"},{id:34,n:"Aoiz"},
  {id:22,n:"Aralar"},{id:23,n:"Arangoiti"},
  {id:243,n:"Arazuri (INTIA)"},{id:264,n:"Artajona"},
  {id:6,n:"Bardenas (Barranco INTIA)"},{id:275,n:"Bardenas (El Plano)"},
  {id:31,n:"Bardenas (El Yugo)"},{id:26,n:"Bardenas (Loma Negra)"},
  {id:268,n:"Bargota"},{id:12,n:"Beortegi"},
  {id:460,n:"Bera (Larrategaña)"},{id:4,n:"Cadreita (INTIA)"},
  {id:35,n:"Carcastillo (La Oliva)"},{id:24,n:"Carrascal"},
  {id:276,n:"Cascante"},{id:258,n:"Corella (INTIA)"},
  {id:42,n:"Doneztebe-Santesteban"},{id:28,n:"El Perdón"},
  {id:461,n:"Eltzaburu"},{id:249,n:"Erremendia (Salazar)"},
  {id:7,n:"Estella"},{id:517,n:"Etxalar (Orizkiko Lepoa)"},
  {id:8,n:"Etxarri-Aranatz"},{id:269,n:"Falces"},
  {id:273,n:"Fitero"},{id:259,n:"Funes (INTIA)"},
  {id:246,n:"Getadar"},{id:499,n:"Goizueta"},
  {id:25,n:"Gorramendi"},{id:497,n:"Iñarbegi"},
  {id:32,n:"Irabia"},{id:502,n:"Isaba-Refugio Belagua"},
  {id:267,n:"Lerín (INTIA)"},{id:518,n:"Lesaka (Astazelaieta)"},
  {id:424,n:"Los Arcos"},{id:247,n:"Lumbier (INTIA)"},
  {id:266,n:"Miranda de Arga"},{id:270,n:"Murillo el Fruto"},
  {id:251,n:"Oco (INTIA)"},{id:257,n:"Olite (INTIA)"},
  {id:37,n:"Oskotz"},{id:455,n:"Pamplona"},
  {id:271,n:"San Adrián"},{id:265,n:"San Martín de Unx"},
  {id:5,n:"Sartaguda (INTIA)"},{id:21,n:"Sartaguda"},
  {id:423,n:"Sesma"},{id:9,n:"Tafalla"},
  {id:242,n:"Traibuenas (INTIA)"},{id:29,n:"Trinidad de Iturgoien"},
  {id:36,n:"Tudela (Montes de Cierzo)"},{id:272,n:"Tudela (Valdetellas)"},
  {id:30,n:"Ujué"},{id:250,n:"Urbasa"},
  {id:11,n:"Villanueva de Yerri"},{id:10,n:"Yesa"},
].sort((a,b)=>a.n.localeCompare(b.n,'es'));

const PROXY  = url => `https://meteonavarra.mcalvo81.workers.dev/?url=${encodeURIComponent(url)}`;
const PROXY2 = url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
const PROXY3 = url => `https://corsproxy.io/?${encodeURIComponent(url)}`;

const PARAMS = { temp:1, hum:2, rad:3, ins:4, vel:6, dir:7, raf:9, prec:12 };

const S = {
  est: EST.find(e=>e.id===455),
  favs: JSON.parse(localStorage.getItem('mnf3')||'[]'),
  theme: localStorage.getItem('mnt2')||'dark',
  charts:{}, hist:[], cur:null,
};

function gid(s){ return document.getElementById(s); }

function applyTheme(t){
  S.theme=t;
  document.body.dataset.theme = t==='day'?'day':'';
  gid('tbtn').textContent = t==='day'?'☀️':'🌙';
  gid('mcol').content = t==='day'?'#1565c0':'#1a3a5c';
  localStorage.setItem('mnt2',t);
  if(S.hist.length) renderCharts(S.hist);
}

function buildSel(){
  const sel = gid('ss');
  sel.innerHTML = '';
  EST.forEach(e=>{
    const op = document.createElement('option');
    op.value = e.id;
    op.textContent = e.n;
    if(e.id === S.est.id) op.selected = true;
    sel.appendChild(op);
  });
}

const saveFavs = () => localStorage.setItem('mnf3', JSON.stringify(S.favs));
const isFav = id => S.favs.includes(id);

function updFavBtn(){
  const btn = gid('fbtn');
  btn.textContent = isFav(S.est.id) ? '★' : '☆';
  btn.classList.toggle('on', isFav(S.est.id));
}

function renderFavs(){
  const fl = gid('fl');
  if(!S.favs.length){
    fl.innerHTML='<div class="empty">Sin favoritos.<br>Pulsa ☆ para añadir estaciones.</div>';
    return;
  }
  fl.innerHTML='';
  S.favs.forEach(fid=>{
    const e = EST.find(x=>x.id===fid); if(!e) return;
    const d = document.createElement('div'); d.className='fi';
    d.innerHTML=`<div><div class="fn">${e.n}</div><div class="fz">🟢 Automática</div></div><button class="frm" data-id="${fid}">✕</button>`;
    d.addEventListener('click', ev=>{
      if(ev.target.classList.contains('frm')) return;
      selSt(fid); switchTab('datos');
    });
    d.querySelector('.frm').addEventListener('click', ()=>{
      S.favs=S.favs.filter(f=>f!==fid);
      saveFavs(); updFavBtn(); renderFavs(); toast('Eliminado');
    });
    fl.appendChild(d);
  });
}

let toastT;
function toast(m){
  const t=gid('toast');
  t.textContent=m; t.classList.add('on');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('on'),2200);
}

function buildURL(estId, param){
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const fmt = d => `${pad(d.getDate())}%2F${pad(d.getMonth()+1)}%2F${d.getFullYear()}`;
  const ayer = new Date(now); ayer.setDate(ayer.getDate()-1);
  const tom  = new Date(now); tom.setDate(tom.getDate()+1);
  return `https://meteo.navarra.es/estaciones/estacion_datos_m.cfm?idestacion=${estId}&fecha_desde=${fmt(ayer)}&fecha_hasta=${fmt(tom)}&p_10=${param}`;
}

async function fetchOne(url){
  const proxies = [PROXY, PROXY2, PROXY3];
  for(const px of proxies){
    try{
      const r = await fetch(px(url), {signal: AbortSignal.timeout(15000)});
      if(!r.ok) continue;
      const txt = await r.text();
      if(txt.length > 200) return txt;
    }catch(e){}
  }
  return null;
}

function parseOneParam(html){
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const result = {};
  let dataTable = null;
  for(const t of doc.querySelectorAll('table')){
    if(t.querySelectorAll('tr').length > 5){ dataTable=t; break; }
  }
  if(!dataTable) return result;
  const rows = dataTable.querySelectorAll('tr');
  for(let i=2; i<rows.length; i++){
    const cells = rows[i].querySelectorAll('td');
    if(cells.length < 2) continue;
    const dateStr = cells[0].textContent.trim();
    if(!dateStr || dateStr.includes('Página')) continue;
    const parts = dateStr.split(' ');
    const hora  = parts[1] || '';
    const fecha = parts[0] || '';
    const raw = cells[1].textContent.trim().replace(',','.');
    if(!raw || raw==='- -' || raw==='--' || raw==='-') continue;
    const v = parseFloat(raw);
    if(!isNaN(v)) result[fecha+'_'+hora] = {v, fecha, hora};
  }
  return result;
}

function showLdr(){
  let l=gid('ldr');
  if(!l){l=document.createElement('div');l.id='ldr';l.style.display='flex';l.innerHTML='<div class="sp"></div><span>Conectando...</span>';document.body.appendChild(l);}
  else{l.style.display='flex';}
}
function hideLdr(){
  const l=gid('ldr');if(l){l.style.display='none';}
}

async function load(){
  setStatus('ld','Conectando con MeteoNavarra...');
  showLdr();
  gid('eb').classList.remove('on');
  gid('dc').innerHTML='';
  gid('upd').textContent='';

  try{
    const entries = Object.entries(PARAMS);
    const results = await Promise.all(
      entries.map(([key,pnum]) =>
        fetchOne(buildURL(S.est.id, pnum))
          .then(html => ({key, data: html ? parseOneParam(html) : {}}))
          .catch(()  => ({key, data: {}}))
      )
    );

    const combined = {};
    for(const {key, data} of results){
      for(const [key2, {v, fecha, hora}] of Object.entries(data)){
        if(!combined[key2]) combined[key2] = {hora, fecha, key2};
        combined[key2][key] = v;
      }
    }

    // Ordenar por fecha y hora correctamente
    const rows = Object.values(combined).sort((a,b)=>{
      const da = a.fecha.split('/').reverse().join('')+a.hora.replace(':','');
      const db = b.fecha.split('/').reverse().join('')+b.hora.replace(':','');
      return da.localeCompare(db);
    });

    if(!rows.length){
      throw new Error('MeteoNavarra no devolvió datos para esta estación.\nPrueba con otra estación automática.');
    }

    // Última lectura válida — la más reciente de todas con datos
    const cur = [...rows].reverse().find(r=>r.temp!=null||r.vel!=null) || rows[rows.length-1];
    S.cur=cur; S.hist=rows;

    renderDatos(cur);
    renderCharts(rows);

    gid('upd').textContent = `Última lectura: ${cur.fecha||''} ${cur.hora||''} · MeteoNavarra`;
    setStatus('ok', S.est.n);

  }catch(err){
    const eb = gid('eb');
    eb.innerHTML = `<strong>⚠️ Error al cargar datos</strong><br><br>${err.message.replace(/\n/g,'<br>')}`;
    eb.classList.add('on');
    setStatus('er','Error — sin datos');
  }finally{
    hideLdr();
  }
}

function deg2dir(d){
  if(d==null) return '--';
  const ds=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'];
  return ds[Math.round(((d%360)+360)/22.5)%16];
}
function tempColor(t){
  if(t==null) return 'var(--tx)';
  if(t<=0) return '#81d4fa'; if(t<=10) return '#4fc3f7';
  if(t<=20) return '#81c784'; if(t<=28) return '#ffb74d'; return '#ef5350';
}
function wxIcon(t,r,rd){
  if(r>2) return '🌧️'; if(r>.2) return '🌦️';
  if(rd>600) return '☀️'; if(rd>200) return '⛅';
  if(t!=null&&t<0) return '❄️'; return '🌥️';
}
const fm = (v,d=1) => v!=null ? parseFloat(v).toFixed(d) : '--';

function renderDatos(d){
  const dir = deg2dir(d.dir);
  const deg = d.dir||0;
  gid('dc').innerHTML=`
  <div class="grp">
    <div class="grp-title">🌡️ Temperatura &amp; Humedad</div>
    <div class="grp-row">
      <div class="grp-main">
        <div style="font-size:38px;margin-bottom:4px">${wxIcon(d.temp,d.prec||0,d.rad||0)}</div>
        <div class="big-val" style="color:${tempColor(d.temp)}">${fm(d.temp,1)}°C</div>
        <div class="big-lbl">Temperatura</div>
      </div>
      <div class="grp-main">
        <div style="font-size:38px;margin-bottom:4px">💧</div>
        <div class="big-val">${fm(d.hum,0)}%</div>
        <div class="big-lbl">Humedad rel.</div>
      </div>
    </div>
  </div>
  <div class="grp">
    <div class="grp-title">💨 Viento</div>
    <div class="grp-row" style="align-items:center">
      <svg class="cmp" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="28" fill="none" stroke="var(--bd)" stroke-width="1.5"/>
        <text x="30" y="9"  text-anchor="middle" fill="var(--t3)" font-size="7.5" font-family="system-ui">N</text>
        <text x="30" y="55" text-anchor="middle" fill="var(--t3)" font-size="7.5" font-family="system-ui">S</text>
        <text x="7"  y="33" text-anchor="middle" fill="var(--t3)" font-size="7.5" font-family="system-ui">O</text>
        <text x="53" y="33" text-anchor="middle" fill="var(--t3)" font-size="7.5" font-family="system-ui">E</text>
        <g transform="rotate(${deg},30,30)">
          <polygon points="30,8 26,30 30,25 34,30" fill="var(--ac)"/>
          <polygon points="30,52 26,30 30,35 34,30" fill="var(--bd)"/>
        </g>
        <circle cx="30" cy="30" r="3" fill="var(--ac)"/>
      </svg>
      <div style="flex:1">
        <div class="wind-dir">${dir}</div>
        <div class="wind-row2">
          <div><div class="big-lbl">Vel. media</div><div class="big-val" style="font-size:26px">${fm(d.vel,1)} <span style="font-size:14px;color:var(--t2)">km/h</span></div></div>
          <div><div class="big-lbl">Ráfaga máx.</div><div class="big-val" style="font-size:26px">${fm(d.raf,1)} <span style="font-size:14px;color:var(--t2)">km/h</span></div></div>
        </div>
      </div>
    </div>
  </div>
  <div class="grp-2col">
    <div class="grp">
      <div class="grp-title">🌧️ Precipitación</div>
      <div class="big-val">${fm(d.prec,1)}</div>
      <div class="big-lbl">L/m²</div>
    </div>
    <div class="grp">
      <div class="grp-title">☀️ Radiación &amp; Insolación</div>
      <div class="big-val">${fm(d.rad,0)} <span style="font-size:14px;color:var(--t2)">W/m²</span></div>
      <div class="big-lbl" style="margin-top:6px">Insolación: ${fm(d.ins,0)} s</div>
    </div>
  </div>`;
}

function renderCharts(rows){
  const day = S.theme==='day';
  const gc = day?'rgba(192,212,232,.8)':'rgba(42,74,107,.7)';
  const tc = day?'#2a5a8a':'#90b4ce';
  const data = rows.slice(-144);
  // Mostrar solo la hora en el label para no saturar el eje
  const labels = data.map(r=>r.hora||'');
  const base = {
    responsive:true, maintainAspectRatio:false,
    plugins:{legend:{labels:{color:tc,font:{size:11}}}},
    scales:{x:{ticks:{color:tc,font:{size:10},maxRotation:45,maxTicksLimit:12},grid:{color:gc}}}
  };

  if(S.charts.c1) S.charts.c1.destroy();
  S.charts.c1 = new Chart(gid('ch1'),{type:'line',
    data:{labels,datasets:[
      {label:'Humedad (%)',data:data.map(r=>r.hum),borderColor:'#29b6f6',backgroundColor:'rgba(41,182,246,.12)',fill:true,tension:.4,pointRadius:1.5,yAxisID:'y'},
      {label:'Dir. Viento (°)',data:data.map(r=>r.dir),borderColor:'#ce93d8',fill:false,tension:0,pointRadius:2,pointStyle:'triangle',yAxisID:'y1'}
    ]},
    options:{...base,scales:{...base.scales,
      y:{position:'left',ticks:{color:'#29b6f6',font:{size:10}},grid:{color:gc},min:0,max:100},
      y1:{position:'right',ticks:{color:'#ce93d8',font:{size:10}},grid:{drawOnChartArea:false},min:0,max:360}
    }}
  });

  if(S.charts.c2) S.charts.c2.destroy();
  S.charts.c2 = new Chart(gid('ch2'),{type:'line',
    data:{labels,datasets:[
      {label:'Vel. media (km/h)',data:data.map(r=>r.vel),borderColor:'#66bb6a',backgroundColor:'rgba(102,187,106,.12)',fill:true,tension:.4,pointRadius:1.5},
      {label:'Ráfaga máx. (km/h)',data:data.map(r=>r.raf),borderColor:'#ef5350',fill:false,tension:.3,pointRadius:1.5,borderDash:[5,3]}
    ]},
    options:{...base,scales:{...base.scales,
      y:{ticks:{color:tc,font:{size:10}},grid:{color:gc},min:0}
    }}
  });
}

function setStatus(t,msg){
  gid('dot').className = t==='ld'?'ld':t==='er'?'er':'';
  gid('stx').textContent = msg;
}
function switchTab(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  gid(`page-${name}`).classList.add('on');
  document.querySelector(`.tab[data-p="${name}"]`).classList.add('on');
}
function selSt(eid){
  S.est = EST.find(e=>e.id===eid)||EST[0];
  const sel = gid('ss');
  for(const op of sel.options) if(parseInt(op.value)===S.est.id){ op.selected=true; break; }
  updFavBtn(); load();
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', function(){
  applyTheme(S.theme);
  buildSel();
  updFavBtn();
  renderFavs();

  gid('ss').addEventListener('change', function(){
    if(!this.value) return;
    S.est = EST.find(e=>e.id===parseInt(this.value));
    updFavBtn(); load();
  });
  gid('rbtn').addEventListener('click', load);
  gid('tbtn').addEventListener('click', ()=>applyTheme(S.theme==='day'?'dark':'day'));
  gid('fbtn').addEventListener('click', ()=>{
    const i=S.est.id;
    if(isFav(i)){S.favs=S.favs.filter(f=>f!==i);toast('Eliminada de favoritos');}
    else{S.favs.push(i);toast('⭐ Añadida a favoritos');}
    saveFavs(); updFavBtn(); renderFavs();
  });
  document.querySelectorAll('.tab').forEach(t=>
    t.addEventListener('click', ()=>switchTab(t.dataset.p))
  );

  load();
  setInterval(load, 10*60*1000);
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
});
</script>
</body>
</html>
